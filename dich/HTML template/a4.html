<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Translated Document</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #f3f4f6;
      font-family: "Times New Roman", serif;
      color: #111827;
    }
    .a4-page {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      background: #fff;
      padding: 18mm;
      box-sizing: border-box;
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.1);
    }
    h1 {
      margin: 0 0 14px;
      font-size: 20px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.2px;
    }
    .doc-content {
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.45;
    }
    @media print {
      body { background: #fff; padding: 0; }
      .a4-page {
        box-shadow: none;
        margin: 0;
        width: 100%;
        min-height: unset;
      }
    }
  </style>
</head>
<body>
  <div class="a4-page">
    <h1>Translated Document</h1>
    <div class="doc-content">{{CONTENT}}</div>
  </div>
</body>
</html>
